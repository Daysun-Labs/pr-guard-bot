# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# pr-guard — GitHub Actions skeleton
#
# 이 workflow를 본인의 각 제품 리포의 .github/workflows/에 복사하면,
# PR 이벤트가 발생할 때마다 pr-guard-bot이 PRD.md+SEED.md를 읽고
# PR diff와 대조하여 코멘트·Slack 알림·수정 PR을 생성한다.
#
# 필요한 secrets:
#   HERMES_PR_GUARD_WEBHOOK_URL   — 선택/권장: Hermes webhook/API endpoint (LLM/OAuth는 Hermes가 담당)
#   HERMES_PR_GUARD_WEBHOOK_TOKEN — 선택/권장: Hermes webhook Bearer token
#   ANTHROPIC_API_KEY             — 선택: Hermes webhook이 없을 때만 쓰는 legacy fallback
#   SLACK_WEBHOOK_URL             — Slack incoming webhook URL
# GITHUB_TOKEN은 자동 주입됨. public fork PR에서는 secrets/write 권한이 없으므로
# --no-publish artifact-only mode로 실행한다.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: pr-guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

# 동일 PR에 여러 push가 들어와도 직전 실행은 취소
concurrency:
  group: pr-guard-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  # Public-safe default: never let an LLM provider create fix PR branches unless
  # the repo owner explicitly opts in by setting this repository variable > 0.
  # If you enable fix PRs, also raise `permissions.contents` to `write`.
  PR_GUARD_MAX_FIX_PRS: ${{ vars.PR_GUARD_MAX_FIX_PRS || '0' }}

jobs:
  guard:
    name: PR Guard
    runs-on: ubuntu-latest
    timeout-minutes: 10  # MVP SLA: 5분, 마진 2배

    # 봇 자신이 만든 PR / 명시적 skip 라벨은 항상 건너뜀
    if: |
      github.event_name == 'workflow_dispatch' || (
        !contains(github.event.pull_request.labels.*.name, 'pr-guard:skip') &&
        !startsWith(github.head_ref, 'pr-guard/')
      )

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          # Avoid fetching every branch/tag; some repos/org policies reject that ref listing.
          # The guard only needs the checked-out PR ref plus the base ref fetched below.
          fetch-depth: 2

      - name: Fetch base ref for PR diff
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_REF:refs/remotes/origin/$BASE_REF"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pr-guard
        run: |
          # 봇 본체, 테스트 의존성, legacy Anthropic fallback extra 설치
          pip install -e ".[dev,anthropic]"

      - name: Hermes adapter live smoke (temporary)
        if: github.event_name == 'pull_request'
        env:
          HERMES_PR_GUARD_WEBHOOK_URL: ${{ secrets.HERMES_PR_GUARD_WEBHOOK_URL }}
          HERMES_PR_GUARD_WEBHOOK_TOKEN: ${{ secrets.HERMES_PR_GUARD_WEBHOOK_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ -z "${HERMES_PR_GUARD_WEBHOOK_URL:-}" || -z "${HERMES_PR_GUARD_WEBHOOK_TOKEN:-}" ]]; then
            echo "::notice title=Hermes adapter smoke::Webhook secrets are not configured; skipping live smoke."
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          import urllib.request

          url = os.environ["HERMES_PR_GUARD_WEBHOOK_URL"].rstrip("/")
          payload = {
              "schema_version": "pr-guard.hermes-proposal/v1",
              "task": "code_fix",
              "metadata": {
                  "repo": os.environ["REPO"],
                  "pr_number": int(os.environ["PR_NUMBER"]),
                  "base_ref": os.environ["BASE_REF"],
                  "head_ref": os.environ["HEAD_REF"],
                  "head_sha": os.environ["HEAD_SHA"],
              },
              "drift": {
                  "type": "missing_requirement",
                  "severity": "medium",
                  "source": "prd",
                  "source_file": "PRD.md",
                  "section": "Acceptance Criteria",
                  "kind": "acceptance",
                  "quote": "The PR must prove Hermes adapter reachability from GitHub-hosted runners.",
                  "line": 1,
                  "score": 0.5,
              },
              "repo_context": "README.md\n.github/workflows/pr-guard.yml\n",
              "output_path": "docs/pr-guard-proposals/hermes-live-smoke.md",
              "proposal_shape": ["action", "new_content", "message", "rationale"],
          }
          body = json.dumps(payload).encode("utf-8")
          request = urllib.request.Request(
              url,
              data=body,
              method="POST",
              headers={
                  "Authorization": f"Bearer {os.environ['HERMES_PR_GUARD_WEBHOOK_TOKEN']}",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(request, timeout=75) as response:
              response_body = response.read().decode("utf-8")
              status = response.status
          data = json.loads(response_body)
          action = data.get("action")
          if action not in {"update", "skip"}:
              raise SystemExit(f"Unexpected Hermes adapter action: {action!r}")
          message = (data.get("message") or data.get("reason") or "")[:220].replace("\n", " ")
          print(f"Hermes adapter smoke status={status} action={action} message={message}")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("## Hermes adapter live smoke\n")
              fh.write(f"- status: `{status}`\n")
              fh.write(f"- action: `{action}`\n")
              fh.write(f"- message: {message}\n")
          PY

      - name: Run PR Guard
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          HERMES_PR_GUARD_WEBHOOK_URL: ${{ secrets.HERMES_PR_GUARD_WEBHOOK_URL }}
          HERMES_PR_GUARD_WEBHOOK_TOKEN: ${{ secrets.HERMES_PR_GUARD_WEBHOOK_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IS_FORK_PR: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          extra_args=(--publish-best-effort)
          if [[ "$IS_FORK_PR" == "true" ]]; then
            echo "::notice title=pr-guard::Fork PR detected; running artifact-only --no-publish mode."
            extra_args+=(--no-publish)
          fi

          python -m pr_guard \
            --repo "$REPO" \
            --pr-number "$PR_NUMBER" \
            --base-ref "$BASE_REF" \
            --head-ref "$HEAD_REF" \
            --json-output pr-guard-report.json \
            "${extra_args[@]}" \
            --fail-on-drift

      - name: Upload PR Guard report
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-guard-report
          path: pr-guard-report.json
          if-no-files-found: ignore

      - name: Smoke test (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          PYTHONPATH=src pytest -v
