# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# pr-guard — GitHub Actions skeleton
#
# 이 workflow를 본인의 각 제품 리포의 .github/workflows/에 복사하면,
# PR 이벤트가 발생할 때마다 pr-guard-bot이 PRD.md+SEED.md를 읽고
# PR diff와 대조하여 코멘트·Slack 알림·수정 PR을 생성한다.
#
# 필요한 secrets:
#   ANTHROPIC_API_KEY    — LLM 분석용 (Claude)
#   SLACK_WEBHOOK_URL    — Slack incoming webhook URL
# GITHUB_TOKEN은 자동 주입됨 (write 권한 명시 필요)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: pr-guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

# 동일 PR에 여러 push가 들어와도 직전 실행은 취소
concurrency:
  group: pr-guard-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  guard:
    name: PR Guard
    runs-on: ubuntu-latest
    timeout-minutes: 10  # MVP SLA: 5분, 마진 2배

    # 봇 자신이 만든 PR / 명시적 skip 라벨은 항상 건너뜀
    if: |
      github.event_name == 'workflow_dispatch' || (
        !contains(github.event.pull_request.labels.*.name, 'pr-guard:skip') &&
        !startsWith(github.head_ref, 'pr-guard/')
      )

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # diff 계산을 위해 full history

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pr-guard
        run: |
          # 봇 본체와 테스트 의존성 모두 설치
          pip install -e ".[dev]"

      - name: Run PR Guard
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          python -m pr_guard \
            --repo "$REPO" \
            --pr-number "$PR_NUMBER" \
            --base-ref "$BASE_REF" \
            --head-ref "$HEAD_REF"

      - name: Smoke test (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          PYTHONPATH=src pytest -v
