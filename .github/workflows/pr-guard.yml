# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# pr-guard — GitHub Actions skeleton
#
# 이 workflow를 본인의 각 제품 리포의 .github/workflows/에 복사하면,
# PR 이벤트가 발생할 때마다 pr-guard-bot이 PRD.md+SEED.md를 읽고
# PR diff와 대조하여 코멘트·Slack 알림·수정 PR을 생성한다.
#
# 필요한 secrets:
#   HERMES_PR_GUARD_WEBHOOK_URL   — 선택/권장: Hermes webhook/API endpoint (LLM/OAuth는 Hermes가 담당)
#   HERMES_PR_GUARD_WEBHOOK_TOKEN — 선택/권장: Hermes webhook Bearer token
#   ANTHROPIC_API_KEY             — 선택: Hermes webhook이 없을 때만 쓰는 legacy fallback
#   SLACK_WEBHOOK_URL             — Slack incoming webhook URL
# GITHUB_TOKEN은 자동 주입됨. public fork PR에서는 secrets/write 권한이 없으므로
# --no-publish artifact-only mode로 실행한다.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: pr-guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

# 동일 PR에 여러 push가 들어와도 직전 실행은 취소
concurrency:
  group: pr-guard-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  # Public-safe default: never let an LLM provider create fix PR branches unless
  # the repo owner explicitly opts in by setting this repository variable > 0.
  # If you enable fix PRs, also raise `permissions.contents` to `write`.
  PR_GUARD_MAX_FIX_PRS: ${{ vars.PR_GUARD_MAX_FIX_PRS || '0' }}

jobs:
  guard:
    name: PR Guard
    runs-on: ubuntu-latest
    timeout-minutes: 10  # MVP SLA: 5분, 마진 2배

    # 봇 자신이 만든 PR / 명시적 skip 라벨은 항상 건너뜀
    if: |
      github.event_name == 'workflow_dispatch' || (
        !contains(github.event.pull_request.labels.*.name, 'pr-guard:skip') &&
        !startsWith(github.head_ref, 'pr-guard/')
      )

    steps:
      - name: Checkout PR
        # actions/checkout@v4 pinned to an immutable commit for CI supply-chain safety.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # Avoid fetching every branch/tag; some repos/org policies reject that ref listing.
          # The guard only needs the checked-out PR ref plus the base ref fetched below.
          fetch-depth: 2

      - name: Fetch base ref for PR diff
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_REF:refs/remotes/origin/$BASE_REF"

      - name: Setup Python
        # actions/setup-python@v5 pinned to an immutable commit for CI supply-chain safety.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Install pr-guard
        run: |
          # 봇 본체, 테스트 의존성, adapter smoke deps, legacy Anthropic fallback extra 설치
          pip install -e ".[dev,anthropic,adapter]"

      - name: Hermes proposal adapter smoke
        if: github.event_name == 'pull_request' && github.head_ref == 'codex/hermes-proposal-smoke'
        env:
          HERMES_PR_GUARD_WEBHOOK_URL: ${{ secrets.HERMES_PR_GUARD_WEBHOOK_URL }}
          HERMES_PR_GUARD_WEBHOOK_TOKEN: ${{ secrets.HERMES_PR_GUARD_WEBHOOK_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          url = os.environ.get("HERMES_PR_GUARD_WEBHOOK_URL", "").strip()
          token = os.environ.get("HERMES_PR_GUARD_WEBHOOK_TOKEN", "").strip()
          repo = os.environ.get("GITHUB_REPOSITORY", "").strip()
          if not url or not token:
              raise SystemExit("Hermes PR Guard adapter secrets are not configured")

          def smoke(path: str) -> None:
              with open(path, "r", encoding="utf-8") as fh:
                  payload_json = json.load(fh)
              payload_json.setdefault("metadata", {})["repo"] = repo
              payload = json.dumps(payload_json).encode()
              req = urllib.request.Request(
                  url,
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/json",
                      "Content-Type": "application/json",
                      "User-Agent": "pr-guard-bot-actions-smoke/0.1",
                      "X-PR-Guard-Request-Id": f"actions-smoke-{os.path.basename(path)}",
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      body = response.read()
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", "replace")[:240]
                  raise SystemExit(f"{path}: HTTP {exc.code} from adapter: {detail}") from exc
              data = json.loads(body)
              action = data.get("action")
              if action == "update":
                  required = {"new_content", "message", "rationale"}
                  missing = sorted(required - data.keys())
                  if missing:
                      raise SystemExit(f"{path}: update missing fields {missing}")
                  print(
                      f"{path}: update JSON ok "
                      f"(new_content_len={len(data['new_content'])}, "
                      f"message_len={len(data['message'])}, "
                      f"rationale_len={len(data['rationale'])})"
                  )
              elif action == "skip":
                  print(f"{path}: skip JSON ok")
              else:
                  raise SystemExit(f"{path}: unexpected action {action!r}")

          smoke("adapter/examples/code_fix.request.json")
          smoke("adapter/examples/seed_fix.request.json")
          PY

      - name: Run PR Guard
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          HERMES_PR_GUARD_WEBHOOK_URL: ${{ secrets.HERMES_PR_GUARD_WEBHOOK_URL }}
          HERMES_PR_GUARD_WEBHOOK_TOKEN: ${{ secrets.HERMES_PR_GUARD_WEBHOOK_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IS_FORK_PR: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          extra_args=(--publish-best-effort)
          if [[ "$IS_FORK_PR" == "true" ]]; then
            echo "::notice title=pr-guard::Fork PR detected; running artifact-only --no-publish mode."
            extra_args+=(--no-publish)
          fi

          python -m pr_guard \
            --repo "$REPO" \
            --pr-number "$PR_NUMBER" \
            --base-ref "$BASE_REF" \
            --head-ref "$HEAD_REF" \
            --json-output pr-guard-report.json \
            "${extra_args[@]}" \
            --fail-on-drift

      - name: Upload PR Guard report
        if: always() && github.event_name == 'pull_request'
        # actions/upload-artifact@v4 pinned to an immutable commit for CI supply-chain safety.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pr-guard-report
          path: pr-guard-report.json
          if-no-files-found: ignore

      - name: Smoke test (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          PYTHONPATH=src pytest -v
