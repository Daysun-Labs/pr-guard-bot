# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Crystallized Seed v1.1 — pr-guard-bot
# Updated for Hermes-backed PR Guard gate
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

goal: |
  본인이 다양한 AI 코딩 도구(Claude Code, Codex, Hermes 등)로 Vibecoding
  하면서도, 만드는 모든 제품이 각 리포의 PRD/SEED가 정의한 Production
  기준을 충족하도록 GitHub PR 단위로 검증·교정해주는 personal PR Guard 봇.
  GitHub Actions는 deterministic gate와 JSON report를 담당하고,
  Hermes Agent webhook은 선택적 semantic/fix provider를 담당한다.

constraints:
  - 단일 사용자(본인)용 personal tool — multi-tenant/SaaS/결제 일체 불필요
  - 봇은 어떤 성공 기준도 hardcode 하지 않음 (per-repo PRD/SEED 기반만)
  - GitHub Actions PR Guard job은 Required Check로 동작해야 함
  - Hermes/Ouroboros는 HERMES_PR_GUARD_WEBHOOK_URL/TOKEN이 설정된 경우에만 선택적 provider로 호출
  - 원본 PR 직접 force-push/edit 금지 — marker comment 업데이트 또는 별도 수정 PR만 허용
  - Vibe 보호 — 비동기 PR-after 동작만, 실시간 코딩 인터럽트 금지
  - Default static gate dependency는 httpx 중심으로 유지하고 Anthropic은 optional legacy fallback

acceptance_criteria:
  - 임의 리포의 pull_request opened/synchronize 이벤트 → 5분 내 PR Guard GitHub Actions check와 Slack 알림 도착
  - PRD/SEED 대비 advisory drift 감지 시 PR 코멘트 + pr-guard-report.json이 일관되게 생성되되, 정적 토큰 매칭 부분일치는 기본적으로 non-blocking(advisory)이고 blocking drift(또는 --fail-on-advisory-drift opt-in)에서만 fail-on-drift가 실패함
  - drift가 PRD(의도)와 어김이면 Hermes provider가 code-fix 수정 PR 제안을 생성할 수 있음
  - drift가 SEED(구현 명세)와 어김이면 Hermes provider가 seed-fix 수정 PR 제안을 생성할 수 있음
  - PRD/SEED 없는 리포는 onboarding 안내 코멘트 또는 안내 PR 생성
  - 30일간 본인의 모든 제품 PR이 PR Guard 파이프라인을 통과
  - L1 정적 정합성 oracle (PR diff ↔ PRD/SEED)과 structured JSON report 기본 동작

ontology_schema:
  name: PRGuardSession
  description: |
    단일 GitHub PR을 PRD/SEED 명세와 대조하여 drift를 감지하고
    분류된 수정 PR을 생성하는 봇의 작업 단위.
  fields:
    - name: pr_metadata
      type: object
      description: PR 번호·repo·author·branch·diff URL
    - name: prd_intent
      type: object
      description: 파싱된 PRD.md (target·value·success·scale)
    - name: seed_spec
      type: object
      description: 파싱된 SEED.md/SEED.yaml (constraints·acceptance·ontology)
    - name: diff_analysis
      type: object
      description: PR diff와 PRD/SEED의 정적·의미 정합성 분석
    - name: drift_findings
      type: array
      description: "{type, severity, source:prd|seed, quote, location}"
    - name: fix_pr_proposals
      type: array
      description: "{kind:code|seed, patch, rationale}"
    - name: notification_payload
      type: object
      description: Slack incoming-webhook 메시지 페이로드
    - name: oracle_level_used
      type: string
      description: "L1 | L1.5 | L2 | L3"
    - name: repo_health_state
      type: string
      description: "no_prd_seed | drift_detected | aligned"

evaluation_principles:
  - name: vibe_preservation
    description: 비동기·PR-after, 코딩 흐름 인터럽트 절대 금지
    weight: 0.95
  - name: spec_grounded
    description: 자체 기준 없음 — 오직 per-repo PRD/SEED 기반으로만 판정
    weight: 0.95
  - name: classification_accuracy
    description: drift가 PRD(의도) vs SEED(구현)와 어김을 정확히 분류
    weight: 0.90
  - name: non_destructive
    description: 원본 PR/리포 미변경, 모든 수정 제안은 별도 PR로만
    weight: 0.90
  - name: deterministic_gate
    description: Required Check는 GitHub Actions에서 재현 가능한 static gate로 유지
    weight: 0.85
  - name: hermes_provider_optionality
    description: Hermes/Ouroboros semantic/fix provider는 secrets가 있을 때만 선택적으로 실행
    weight: 0.80
  - name: personal_pragmatism
    description: multi-tenant·SaaS·결제·온보딩 흐름 일체 추가 금지
    weight: 0.75

exit_conditions:
  - name: mvp_shipping
    description: 첫 정상 동작 사이클
    criteria: 임의 리포 PR에 5분 내 Slack 알림 + 코멘트 + pr-guard-report.json 생성
  - name: enforced_gate
    description: Required Check로 사용 가능
    criteria: --fail-on-drift가 blocking drift(blocking_count≥1) 존재 시 실패하고, blocking이 없으면(advisory만 있어도) 통과. --fail-on-advisory-drift로 advisory를 blocking으로 승격 가능
  - name: classified_fix
    description: 분류 정확
    criteria: PRD 위반 → code-fix PR, SEED 위반 → seed-fix PR 자동 분류 동작
  - name: onboarding_flow
    description: 신규 리포 안내
    criteria: PRD/SEED 없는 리포에 "ooo interview" 안내 PR 또는 코멘트가 자동 생성됨
  - name: thirty_day_adoption
    description: 실제 사용 정착
    criteria: 30일간 본인의 모든 제품 PR이 봇 파이프라인을 통과

project_type: greenfield

context_references:
  - path: https://hermes-agent.nousresearch.com/docs
    role: reference
    summary: Hermes Agent webhook/provider integration reference
  - path: https://github.com/Q00/ouroboros
    role: optional
    summary: Ouroboros semantic evaluation engine behind Hermes provider

existing_patterns:
  - GitHub Actions trigger on pull_request
  - Marker-based PR comment update
  - Structured JSON artifact upload
  - Hermes Agent webhook provider

existing_dependencies:
  - Python >= 3.12
  - httpx
  - GitHub Actions runner
  - Slack incoming webhook
  - Optional Hermes Agent webhook

metadata:
  version: "1.1"
  ambiguity_score: 0.05
  updated_at: "2026-05-26"
  source: "Hermes-backed PR Guard implementation"
